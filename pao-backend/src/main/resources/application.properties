# PAO Application Configuration
# ==============================

# Core Application Settings
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.jpa.open-in-view=false

# Default Profile (PostgreSQL)
# These will be legacy/default if no environment variables are provided
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dao_db?currentSchema=pao_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:pao_db}

# AI & External Services
app.ai.mcp.url=${MCP_URL:http://localhost:3013}
app.ai.ollama.url=${OLLAMA_URL:http://localhost:11434}
app.ai.ollama.model=${OLLAMA_MODEL:qwen3.5:35b}
app.ai.prefer-local=${PREFER_LOCAL_LLM:false}
app.ai.gemini.key=${GEMINI_KEY:REPLACE_ME}
app.ai.gemini.model=${DEFAULT_MODEL:gemini-1.5-flash}

# Logging
logging.level.org.hibernate.SQL=${LOG_LEVEL_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_BINDER:TRACE}
